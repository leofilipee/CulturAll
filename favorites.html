<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cultur'All | Favoritos</title>
  <meta name="description" content="Veja os eventos marcados como favoritos na Cultur'All." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script defer src="script.js"></script>
</head>
<body data-page="favorites">
  <div class="app-shell">
    <main class="content" id="inicio">
      <header class="topbar">
        <a class="topbar-brand" href="index.html" aria-label="Cultur'All início">
          <span>Cultur'</span><span>All</span>
        </a>

        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
          <input id="searchInput" type="search" placeholder="Pesquisar favoritos..." aria-label="Pesquisar favoritos" />
        </div>

        <div class="topbar-actions">
          <span class="account-chip" id="accountChip" hidden></span>
          <a class="favorites-btn active" href="favorites.html" aria-label="Favoritos">
            <svg viewBox="0 0 24 24"><path d="M12 20s-7-4.6-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 10c0 5.4-7 10-7 10Z"></path></svg>
            Favoritos
          </a>
          <a class="login-btn" id="loginToggleBtn" href="login.html">
            <svg viewBox="0 0 24 24"><path d="M10 17l5-5-5-5"></path><path d="M15 12H4"></path><path d="M20 4v16"></path></svg>
            Entrar
          </a>
        </div>

      </header>

      <section class="home-view">
        <div class="page">
          <section class="section-head" id="favoritos">
            <div>
              <h1 id="sectionTitle">Favoritos</h1>
              <p><span id="resultsCount">0</span> <span id="resultsLabel">favoritos encontrados</span></p>
            </div>
            <div class="view-chip" id="viewChip">Marcados com favorito</div>
          </section>

          <section class="cards-grid" id="cardsGrid" aria-live="polite"></section>
          <div class="empty-state" id="emptyState" data-empty-message="Ainda não tens eventos favoritos guardados." hidden>
            Ainda não tens eventos favoritos guardados.
          </div>
        </div>
      </section>
    </main>
  </div>

  <nav class="mobile-bottom-nav" aria-label="Navegação inferior">
    <a href="index.html#inicio">
      <svg viewBox="0 0 24 24"><path d="M4 11.5 12 4l8 7.5"></path><path d="M6 10.5V20h12v-9.5"></path></svg>
      Início
    </a>
    <a class="active" href="favorites.html">
      <svg viewBox="0 0 24 24"><path d="M12 20s-7-4.6-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 10c0 5.4-7 10-7 10Z"></path></svg>
      Favoritos
    </a>
    <a href="profile.html">
      <svg viewBox="0 0 24 24"><path d="M4 20c1.8-4 4.9-6 8-6s6.2 2 8 6"></path><circle cx="12" cy="8" r="4"></circle></svg>
      Perfil
    </a>
  </nav>
</body>
</html>
