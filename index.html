<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cultur'All | Eventos culturais em Portugal</title>
  <meta name="description" content="Descubra eventos culturais, concertos, teatro, exposições e experiências gastronómicas em Portugal." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script defer src="script.js"></script>
</head>
<body data-page="home">
  <div class="app-shell">
    <aside class="sidebar" aria-label="Menu lateral">
      <a class="brand-mark" href="profile.html" aria-label="Perfil">
        C
      </a>
      <nav class="side-nav">
        <a class="side-link active" href="#inicio" aria-label="Início">
          <svg viewBox="0 0 24 24"><path d="M4 11.5 12 4l8 7.5"></path><path d="M6 10.5V20h12v-9.5"></path></svg>
        </a>
        <a class="side-link" href="events.html" aria-label="Eventos disponíveis">
          <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="3"></rect><path d="M8 3v4"></path><path d="M16 3v4"></path><path d="M4 9h16"></path></svg>
        </a>
        <a class="side-link" href="favorites.html" aria-label="Favoritos">
          <svg viewBox="0 0 24 24"><path d="M12 20s-7-4.6-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 10c0 5.4-7 10-7 10Z"></path></svg>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-badge">AI</div>
        <span>Descobrir<br />eventos</span>
      </div>
    </aside>

    <main class="content" id="inicio">
      <header class="topbar">
        <a class="topbar-brand" href="index.html" aria-label="Cultur'All início">
          <span>Cultur'</span><span>All</span>
        </a>

        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
          <input id="searchInput" type="search" placeholder="Pesquisar eventos..." aria-label="Pesquisar eventos" />
        </div>

        <div class="topbar-actions">
          <span class="account-chip" id="accountChip" hidden></span>
          <a class="login-btn" id="loginToggleBtn" href="login.html">
            <svg viewBox="0 0 24 24"><path d="M10 17l5-5-5-5"></path><path d="M15 12H4"></path><path d="M20 4v16"></path></svg>
            Entrar
          </a>
        </div>

      </header>

      <section class="home-view" id="homeView">
        <div class="page">
          <div class="hero-panel">
            <div class="filters-shell" id="filtersShell">
              <button class="filters-toggle-btn" id="filtersToggleBtn" type="button" aria-expanded="false" aria-controls="filtersGrid">
                <svg viewBox="0 0 24 24"><path d="M4 6h16"></path><path d="M7 12h10"></path><path d="M10 18h4"></path></svg>
                Filtros
              </button>
              <div class="filters-backdrop" id="filtersBackdrop" hidden></div>
              <div class="filters-grid" id="filtersGrid" aria-label="Filtros de eventos">
              <div class="filter-group date-filter-group">
                <label for="categoryFilter">
                  <svg viewBox="0 0 24 24"><path d="M4 6h16"></path><path d="M6 6l4 6-4 6"></path></svg>
                  Categoria
                </label>
                <select id="categoryFilter">
                  <option value="Todos">Todos</option>
                  <option value="Arte e Exposições">Arte e Exposições</option>
                  <option value="Bem Estar">Bem Estar</option>
                  <option value="Cinema">Cinema</option>
                  <option value="Comédia">Comédia</option>
                  <option value="Concertos">Concertos</option>
                  <option value="Dança">Dança</option>
                  <option value="Festivais">Festivais</option>
                  <option value="Gastronomia">Gastronomia</option>
                  <option value="Literatura">Literatura</option>
                  <option value="Mercados e Feiras">Mercados e Feiras</option>
                  <option value="Moda">Moda</option>
                  <option value="Outros">Outros</option>
                  <option value="Para Famílias">Para Famílias</option>
                  <option value="Teatro">Teatro</option>
                </select>
              </div>

              <div class="filter-group date-filter-group">
                <label for="dateFilter">
                  <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="3"></rect><path d="M8 3v4"></path><path d="M16 3v4"></path><path d="M4 9h16"></path></svg>
                  Data
                </label>
                <select id="dateFilter">
                  <option value="Todos">Todos</option>
                  <option value="Hoje">Hoje</option>
                  <option value="Esta semana">Esta semana</option>
                  <option value="Este mês">Este mês</option>
                  <option value="Passados">Passados</option>
                  <option value="Periódicos">Periódicos</option>
                  <option value="Escolher data">Escolher data</option>
                </select>
                <div class="date-custom-controls" id="dateCustomControls" hidden aria-hidden="true">
                  <label for="datePickerInput">Escolhe a data</label>
                  <div class="date-picker-row">
                    <input id="datePickerInput" class="date-picker-input" type="date" />
                    <button id="openDatePickerBtn" class="date-picker-trigger-btn" type="button" aria-label="Abrir calendário">
                      <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="3"></rect><path d="M8 3v4"></path><path d="M16 3v4"></path><path d="M4 9h16"></path></svg>
                    </button>
                  </div>
                  <button id="applyDateBtn" class="apply-date-btn" type="button">Aplicar</button>
                </div>
              </div>

              <div class="filter-group">
                <label for="locationFilter">
                  <svg viewBox="0 0 24 24"><path d="M12 21s6-5.5 6-11a6 6 0 0 0-12 0c0 5.5 6 11 6 11Z"></path><circle cx="12" cy="10" r="2.2"></circle></svg>
                  Localização
                </label>
                <select id="locationFilter">
                  <option value="Todos">Todos</option>
                  <option value="Aveiro">Aveiro</option>
                  <option value="Beja">Beja</option>
                  <option value="Braga">Braga</option>
                  <option value="Bragança">Bragança</option>
                  <option value="Castelo Branco">Castelo Branco</option>
                  <option value="Chaves">Chaves</option>
                  <option value="Coimbra">Coimbra</option>
                  <option value="Covilhã">Covilhã</option>
                  <option value="Évora">Évora</option>
                  <option value="Faro">Faro</option>
                  <option value="Figueira da Foz">Figueira da Foz</option>
                  <option value="Funchal">Funchal</option>
                  <option value="Guarda">Guarda</option>
                  <option value="Guimarães">Guimarães</option>
                  <option value="Lagos">Lagos</option>
                  <option value="Leiria">Leiria</option>
                  <option value="Lisboa">Lisboa</option>
                  <option value="Loures">Loures</option>
                  <option value="Maia">Maia</option>
                  <option value="Oeiras">Oeiras</option>
                  <option value="Ponta Delgada">Ponta Delgada</option>
                  <option value="Porto">Porto</option>
                  <option value="Santarém">Santarém</option>
                  <option value="Setúbal">Setúbal</option>
                  <option value="Tavira">Tavira</option>
                  <option value="Viana do Castelo">Viana do Castelo</option>
                  <option value="Vila Nova de Gaia">Vila Nova de Gaia</option>
                  <option value="Vila Real">Vila Real</option>
                  <option value="Viseu">Viseu</option>
                </select>
              </div>

              <div class="filter-group">
                <label for="priceFilter">
                  <svg viewBox="0 0 24 24"><path d="M12 2v20"></path><path d="M17 6.5c0-2-2.2-3.5-5-3.5S7 4.6 7 6.7c0 4.2 10 2.3 10 6.4 0 2.2-2 3.9-5 3.9s-5-1.4-5-3.9"></path></svg>
                  Preço
                </label>
                <select id="priceFilter">
                  <option value="Todos">Todos</option>
                  <option value="Gratuito">Gratuito</option>
                  <option value="Pago">Pago</option>
                </select>
              </div>
              </div>
            </div>
          </div>

          <section class="section-head" id="eventos">
            <div>
              <h1 id="sectionTitle">Mais Populares</h1>
              <p><span id="resultsCount">0</span> <span id="resultsLabel">eventos encontrados</span></p>
            </div>
            <div class="section-head-actions">
              <label class="sort-field" for="sortFilter">
                <span>Ordenar por</span>
                <select id="sortFilter" aria-label="Ordenar eventos">
                  <option value="views">Visualizações</option>
                  <option value="proximity">Proximidade</option>
                  <option value="date">Data</option>
                </select>
              </label>
            </div>
          </section>

          <section class="cards-grid" id="cardsGrid" aria-live="polite"></section>
          <div class="empty-state" id="emptyState" hidden>
            Nenhum evento corresponde aos filtros atuais.
          </div>
        </div>
      </section>
    </main>
  </div>

  <nav class="mobile-bottom-nav" aria-label="Navegação inferior">
    <a class="active" href="#inicio">
      <svg viewBox="0 0 24 24"><path d="M4 11.5 12 4l8 7.5"></path><path d="M6 10.5V20h12v-9.5"></path></svg>
      Início
    </a>
    <a href="events.html">
      <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="3"></rect><path d="M8 3v4"></path><path d="M16 3v4"></path><path d="M4 9h16"></path></svg>
      Eventos
    </a>
    <a href="favorites.html">
      <svg viewBox="0 0 24 24"><path d="M12 20s-7-4.6-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 10c0 5.4-7 10-7 10Z"></path></svg>
      Favoritos
    </a>
    <a href="profile.html">
      <svg viewBox="0 0 24 24"><path d="M4 20c1.8-4 4.9-6 8-6s6.2 2 8 6"></path><circle cx="12" cy="8" r="4"></circle></svg>
      Perfil
    </a>
  </nav>
</body>
</html>
