<!DOCTYPE html>
<html lang="pt-PT">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script defer src="script.js"></script>
</head>
<body class="profile-page">
  <div class="app-shell">
    <aside class="sidebar" aria-label="Menu lateral">
      <a class="brand-mark" href="profile.html" aria-label="Perfil">
        C
      </a>
      <nav class="side-nav">
        <a class="side-link active" href="index.html#inicio" aria-label="Início">
          <svg viewBox="0 0 24 24"><path d="M4 11.5 12 4l8 7.5"></path><path d="M6 10.5V20h12v-9.5"></path></svg>
        </a>
        <a class="side-link" href="events.html" aria-label="Eventos disponíveis">
          <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="3"></rect><path d="M8 3v4"></path><path d="M16 3v4"></path><path d="M4 9h16"></path></svg>
        </a>
        <a class="side-link" href="favorites.html" aria-label="Favoritos">
          <svg viewBox="0 0 24 24"><path d="M12 20s-7-4.6-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 10c0 5.4-7 10-7 10Z"></path></svg>

        <div class="sidebar-badge">AI</div>

      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <a class="topbar-brand" href="index.html" aria-label="Cultur'All início">
          <span>Cultur'</span><span>All</span>
        </a>

        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
          <input type="search" placeholder="Pesquisar eventos..." aria-label="Pesquisar eventos" readonly />

        <div class="topbar-actions">
          <span class="account-chip" id="profileAccountChip"></span>
          <button class="login-btn" id="profileLogoutBtn" type="button">
            <svg viewBox="0 0 24 24"><path d="M14 17l5-5-5-5"></path><path d="M19 12H8"></path><path d="M8 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h3"></path></svg>
            Sair
          </button>
        </div>

      </header>

      <section class="profile-view" id="profileRoot"></section>
    </main>
  </div>

  <nav class="mobile-bottom-nav" id="profileMobileNav" aria-label="Navegação inferior"></nav>
