<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cultur'All | Área do utilizador</title>
  <meta name="description" content="Área pessoal Cultur'All para utilizador e organizador." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script defer src="script.js"></script>
</head>
<body class="profile-page">
  <div class="app-shell">
    <main class="content">
      <header class="topbar">
        <a class="topbar-brand" href="index.html" aria-label="Cultur'All início">
          <span>Cultur'</span><span>All</span>
        </a>

        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
          <input type="search" placeholder="Pesquisar eventos..." aria-label="Pesquisar eventos" readonly />
        </div>

        <div class="topbar-actions">
          <a class="account-chip" id="profileAccountChip" href="profile.html"></a>
          <a class="favorites-btn" href="favorites.html" aria-label="Favoritos">
            <svg viewBox="0 0 24 24"><path d="M12 20s-7-4.6-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 10c0 5.4-7 10-7 10Z"></path></svg>
          </a>
          <button class="login-btn" id="profileLogoutBtn" type="button">
            <svg viewBox="0 0 24 24"><path d="M14 17l5-5-5-5"></path><path d="M19 12H8"></path><path d="M8 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h3"></path></svg>
            Sair
          </button>
        </div>

      </header>

      <section class="profile-view" id="profileRoot"></section>
    </main>
  </div>

  <nav class="mobile-bottom-nav" id="profileMobileNav" aria-label="Navegação inferior"></nav>
</body>
</html>
